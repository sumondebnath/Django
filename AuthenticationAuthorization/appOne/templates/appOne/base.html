<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
</head>
<body>
    <nav class="navbar bg-dark">
        <div class="container-fluid">
          <a class="navbar-brand text-white" href="{% url 'home' %}">Navbar</a>
          <div class="d-flex gap-4" >
            {% if user.is_authenticated %}
                <a class="btn btn-outline-success" href="{% url 'profile' %}">Profile</a>
                <a class="btn btn-outline-warning" href="{% url 'logout' %}">Log Out</a>
            {% else %}
                <a class="btn btn-outline-success" href="{% url 'sign_up' %}">Sign Up</a>
                <a class="btn btn-outline-warning" href="{% url 'login' %}">Log In</a>
            {% endif %}
          </div>
        </div>
      </nav>
    {% block body %}

    {% endblock body %}

    <!-- here is the script files -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
</body>
</html>
